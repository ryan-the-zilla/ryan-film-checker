<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan's Mindfuck Checker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e0; font-family:system-ui,-apple-system,sans-serif; min-height:100vh; padding:16px; }
h1 { text-align:center; font-size:1.4rem; margin-bottom:4px; color:#8b5cf6; }
.sub { text-align:center; font-size:0.85rem; color:#666; margin-bottom:20px; }
.stats { text-align:center; margin-bottom:20px; font-size:0.9rem; color:#aaa; }
.stats span { font-weight:bold; }
.stats .seen { color:#22c55e; }
.stats .total { color:#8b5cf6; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:10px; max-width:900px; margin:0 auto; }
.card {
  background:#1a1a2e; border-radius:10px; padding:12px; cursor:pointer;
  transition:all 0.2s; border:2px solid transparent; user-select:none;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.card:hover { background:#1e1e3a; transform:translateY(-2px); }
.card.seen { border-color:#22c55e; background:#0a1a0a; }
.card.seen .dot { background:#22c55e; }
.card.want { border-color:#f59e0b; background:#1a1a0a; }
.card.want .dot { background:#f59e0b; }
.card .dot { width:24px; height:24px; border-radius:50%; background:#333; transition:background 0.2s; display:flex; align-items:center; justify-content:center; font-size:14px; }
.card .title { font-size:0.82rem; text-align:center; font-weight:500; line-height:1.3; }
.card .state-label { font-size:0.65rem; color:#888; text-transform:uppercase; letter-spacing:0.5px; }
.card.seen .state-label { color:#22c55e; }
.card.want .state-label { color:#f59e0b; }
.legend { display:flex; gap:16px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:#888; }
.legend-dot { width:12px; height:12px; border-radius:50%; }
.actions { text-align:center; margin-top:24px; }
button {
  background:#8b5cf6; color:white; border:none; padding:12px 32px; border-radius:8px;
  font-size:1rem; cursor:pointer; font-weight:600; transition:all 0.2s;
}
button:hover { background:#7c3aed; transform:translateY(-1px); }
button.secondary { background:#333; margin-left:8px; }
button.secondary:hover { background:#444; }
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#22c55e; color:white; padding:12px 24px; border-radius:8px;
  font-weight:600; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:99;
}
.toast.show { opacity:1; }
.cat-title {
  max-width:900px; margin:0 auto 8px; padding-top:16px; font-size:0.75rem;
  color:#555; text-transform:uppercase; letter-spacing:1px; border-top:1px solid #1a1a2e;
}
.cat-title:first-of-type { border-top:none; padding-top:0; }
</style>
</head>
<body>
<h1>🎬 Mindfuck Checker</h1>
<p class="sub">Klik = gezien · Dubbelklik = wil zien · Rechts = reset</p>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#333"></div> Niet gezien</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Gezien ✓</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Wil ik zien</div>
</div>
<div class="stats"><span class="seen" id="seenCount">0</span> / <span class="total" id="totalCount">0</span> gezien</div>
<div class="grid" id="grid"></div>
<div class="actions">
  <button onclick="copyResult()">📋 Kopieer Resultaat</button>
  <button class="secondary" onclick="clearAll()">🗑️ Reset</button>
</div>
<div class="toast" id="toast">Gekopieerd naar klembord!</div>

<script>
const films = [
  "12 Monkeys","A Scanner Darkly","Absolutely Anything","Adolescence","Annihilation",
  "Being John Malkovich","Black Mirror","Brazil","Carry-On","Coherence","Continuum",
  "Donnie Darko","Don't Worry Darling","Enemy","Eternal Sunshine of the Spotless Mind",
  "Ex Machina","Her","Inception","MARGUX","Mauvais","Mr. Nobody","Mulholland Drive",
  "Oxygen","Peaceful Warrior","Possessor","Predestination","Primer","Project X",
  "Remember Member","Sightless","Sliver","Snowpiercer","Soylent Green","Source Code",
  "Talk to Me","The Adjustment Bureau","The Big Bang Theory","The Big Short",
  "The Butterfly Effect","The Butterfly Effect 2","The Butterfly Effect 3: Revelations",
  "The Chosen","The Clinic","The Hunt","The I-Land","The Insider","The Martian",
  "The Matrix","The One I Love","The Others","The Perfection","The Prestige",
  "The Truman Show","Transcendence","Triangle","Under the Skin","Undone","Upstream Color",
  "Vivarium","What the Bleep!?","What the #$*! Do We Know!?"
];

// series vs films
const series = ["Black Mirror","Continuum","Travelers","Undone","The Chosen","Adolescence","The Big Bang Theory"];

const allTitles = [...films.sort((a,b)=>a.localeCompare(b))];

// Load saved state
function loadState() {
  try { return JSON.parse(localStorage.getItem('filmState')||'{}'); } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem('filmState', JSON.stringify(state));
}

const state = loadState();
const grid = document.getElementById('grid');

allTitles.forEach(film => {
  const card = document.createElement('div');
  card.className = 'card' + (state[film] ? ' '+state[film] : '');
  card.innerHTML = `<div class="dot">${state[film]==='seen'?'✓':state[film]==='want'?'👁':''}</div><div class="title">${film}</div><div class="state-label">${state[film]==='seen'?'GEZIEN':state[film]==='want'?'WIL ZIEN':'niet gezien'}</div>`;
  
  card.addEventListener('click', () => toggle(card, film, 'seen'));
  card.addEventListener('dblclick', (e) => { e.preventDefault(); toggle(card, film, 'want'); });
  card.addEventListener('contextmenu', (e) => { e.preventDefault(); toggle(card, film, null); });
  
  grid.appendChild(card);
});

function toggle(card, film, newState) {
  const current = state[film];
  if (current === newState) newState = null; // untoggle
  state[film] = newState;
  saveState(state);
  card.className = 'card' + (newState ? ' '+newState : '');
  card.querySelector('.dot').textContent = newState==='seen'?'✓':newState==='want'?'👁':'';
  card.querySelector('.state-label').textContent = newState==='seen'?'GEZIEN':newState==='want'?'WIL ZIEN':'niet gezien';
  updateStats();
}

function updateStats() {
  const seen = Object.values(state).filter(v=>v==='seen').length;
  document.getElementById('seenCount').textContent = seen;
  document.getElementById('totalCount').textContent = allTitles.length;
}
updateStats();

function copyResult() {
  const seen = allTitles.filter(f=>state[f]==='seen');
  const want = allTitles.filter(f=>state[f]==='want');
  const unseen = allTitles.filter(f=>!state[f]);
  let text = `🎬 FILM CHECKER RESULTS\n`;
  text += `✅ GEZIEN (${seen.length}):\n${seen.join(', ')}\n\n`;
  text += `👁 WIL ZIEN (${want.length}):\n${want.join(', ')}\n\n`;
  text += `❓ NIET GEMARKEERD (${unseen.length}):\n${unseen.join(', ')}`;
  navigator.clipboard.writeText(text).then(()=>showToast());
}

function clearAll() {
  if (!confirm('Alles resetten?')) return;
  Object.keys(state).forEach(k=>delete state[k]);
  saveState(state);
  document.querySelectorAll('.card').forEach(card => {
    card.className = 'card';
    card.querySelector('.dot').textContent = '';
    card.querySelector('.state-label').textContent = 'niet gezien';
  });
  updateStats();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
