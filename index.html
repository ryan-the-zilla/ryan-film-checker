<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan's Mindfuck Checker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e0; font-family:system-ui,-apple-system,sans-serif; min-height:100vh; padding:16px; }
h1 { text-align:center; font-size:1.4rem; margin-bottom:4px; color:#8b5cf6; }
.sub { text-align:center; font-size:0.8rem; color:#555; margin-bottom:16px; }
.filters { display:flex; gap:8px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
.filter-btn {
  background:#1a1a2e; border:1px solid #333; color:#888; padding:6px 14px; border-radius:20px;
  font-size:0.75rem; cursor:pointer; transition:all 0.2s; text-transform:uppercase; letter-spacing:0.5px;
}
.filter-btn.active { background:#8b5cf6; color:white; border-color:#8b5cf6; }
.filter-btn:hover { border-color:#8b5cf6; }
.stats { text-align:center; margin-bottom:16px; font-size:0.85rem; color:#666; }
.stats .seen { color:#22c55e; font-weight:bold; }
.stats .total { color:#8b5cf6; font-weight:bold; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:10px; max-width:950px; margin:0 auto; }
.card {
  background:#1a1a2e; border-radius:10px; overflow:hidden; cursor:pointer;
  transition:all 0.2s; border:2px solid transparent; user-select:none; position:relative;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,0.4); }
.card.seen { border-color:#22c55e; }
.card.want { border-color:#f59e0b; }
.card .poster { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:#111; }
.card .info { padding:6px 8px; }
.card .title { font-size:0.72rem; font-weight:600; line-height:1.2; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .badge {
  font-size:0.55rem; padding:1px 6px; border-radius:8px; display:inline-block;
  text-transform:uppercase; letter-spacing:0.5px; font-weight:700;
}
.badge-film { background:#1e3a5f; color:#60a5fa; }
.badge-series { background:#3b1f5e; color:#c084fc; }
.card .overlay {
  position:absolute; top:0; left:0; right:0; bottom:0; display:flex;
  align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s;
  pointer-events:none;
}
.card.seen .overlay { background:rgba(34,197,94,0.3); opacity:1; }
.card.want .overlay { background:rgba(245,158,11,0.3); opacity:1; }
.overlay-icon { font-size:2.5rem; }
.legend { display:flex; gap:14px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:0.7rem; color:#555; }
.legend-dot { width:10px; height:10px; border-radius:50%; }
.actions { text-align:center; margin-top:20px; }
button {
  background:#8b5cf6; color:white; border:none; padding:10px 28px; border-radius:8px;
  font-size:0.9rem; cursor:pointer; font-weight:600; transition:all 0.2s;
}
button:hover { background:#7c3aed; transform:translateY(-1px); }
button.secondary { background:#222; margin-left:8px; }
button.secondary:hover { background:#333; }
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#22c55e; color:white; padding:10px 20px; border-radius:8px;
  font-weight:600; font-size:0.85rem; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:99;
}
.toast.show { opacity:1; }
</style>
</head>
<body>
<h1>🎬 Mindfuck Checker</h1>
<p class="sub">Klik = gezien · Dubbelklik = wil zien · Rechts = reset</p>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#333"></div> Niet gezien</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Gezien</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Wil zien</div>
</div>
<div class="filters">
  <button class="filter-btn active" data-filter="all">Alles</button>
  <button class="filter-btn" data-filter="film">Films</button>
  <button class="filter-btn" data-filter="series">Series</button>
  <button class="filter-btn" data-filter="seen">Gezien</button>
  <button class="filter-btn" data-filter="want">Wil zien</button>
  <button class="filter-btn" data-filter="unseen">Niet gezien</button>
</div>
<div class="stats"><span class="seen" id="seenCount">0</span> / <span class="total" id="totalCount">0</span> gezien</div>
<div class="grid" id="grid"></div>
<div class="actions">
  <button onclick="copyResult()">📋 Kopieer Resultaat</button>
  <button class="secondary" onclick="clearAll()">🗑️ Reset</button>
</div>
<div class="toast" id="toast">Gekopieerd!</div>

function loadState() {
  try { return JSON.parse(localStorage.getItem('filmState2')||'{}'); } catch { return {}; }
}
function saveState(state) { localStorage.setItem('filmState2', JSON.stringify(state)); }

const state = loadState();
const grid = document.getElementById('grid');
let currentFilter = 'all';

function render() {
  grid.innerHTML = '';
  films.forEach(film => {
    const s = state[film.title];
    if (currentFilter === 'seen' && s !== 'seen') return;
    if (currentFilter === 'want' && s !== 'want') return;
    if (currentFilter === 'unseen' && s) return;
    if (currentFilter === 'film' && film.type !== 'film') return;
    if (currentFilter === 'series' && film.type !== 'series') return;

    const card = document.createElement('div');
    card.className = 'card' + (s ? ' '+s : '');
    card.innerHTML = `
      <img class="poster" src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%23111%22 width=%22200%22 height=%22300%22/><text fill=%22%23333%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 font-size=%2214%22>${encodeURIComponent(film.title)}</text></svg>'">
      <div class="overlay"><span class="overlay-icon">${s==='seen'?'✓':s==='want'?'👁':''}</span></div>
      <div class="info">
        <div class="title">${film.title}</div>
        <span class="badge ${film.type==='series'?'badge-series':'badge-film'}">${film.type==='series'?'SERIES':'FILM'}</span>
      </div>
    `;
    card.addEventListener('click', () => toggle(card, film.title, 'seen'));
    card.addEventListener('dblclick', (e) => { e.preventDefault(); toggle(card, film.title, 'want'); });
    card.addEventListener('contextmenu', (e) => { e.preventDefault(); toggle(card, film.title, null); });
    grid.appendChild(card);
  });
}

function toggle(card, title, newState) {
  if (state[title] === newState) newState = null;
  state[title] = newState;
  saveState(state);
  render();
  updateStats();
}

function updateStats() {
  const seen = Object.values(state).filter(v=>v==='seen').length;
  document.getElementById('seenCount').textContent = seen;
  document.getElementById('totalCount').textContent = films.length;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

function copyResult() {
  const seen = films.filter(f=>state[f.title]==='seen').map(f=>f.title);
  const want = films.filter(f=>state[f.title]==='want').map(f=>f.title);
  const unseen = films.filter(f=>!state[f.title]).map(f=>f.title);
  let text = `🎬 FILM CHECKER\n✅ GEZIEN (${seen.length}):\n${seen.join(', ')}\n\n👁 WIL ZIEN (${want.length}):\n${want.join(', ')}\n\n❓ OPEN (${unseen.length}):\n${unseen.join(', ')}`;
  navigator.clipboard.writeText(text).then(()=>showToast());
}

function clearAll() {
  if (!confirm('Alles resetten?')) return;
  Object.keys(state).forEach(k=>delete state[k]);
  saveState(state);
  render();
  updateStats();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

render();
updateStats();
</script>
</body>
</html>
